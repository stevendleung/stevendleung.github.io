baseURL = "https://stevendleung.github.io/"
languageCode = "en-us"
title = "Steven Leung"
theme = "PaperMod"
paginate = 10

[params]
  author = "Steven Leung"
  description = "ML Engineer | AI Security Researcher"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "auto"
  disableSpecial1stPost = true

  [params.homeInfoParams]
    Title = "Steven Leung"
    Content = """
![Steven Leung](/images/headshot.png#profile)

Senior Machine Learning Engineer focused on the intersection of cybersecurity and AI safety.

I build ML-powered threat detection systems at [Duo Security (Cisco)](https://duo.com) and research how to make AI agents safer. My work spans adversarial detection, runtime agent security, and context engineering for agentic AI systems. I also design and build agentic AI solutions that help small businesses transform manual workflows into intelligent, automated operations.

Currently exploring: runtime detection for AI agents, red-teaming agent safety classifiers, and applying cybersecurity methodology to AI safety problems.

**Publications & talks:**
- [Agentic AI Security Threats](https://duo.com/blog/agentic-ai-security-threats), Duo Security Blog, 2026
- [Cisco Talos Year in Review: Attacks Against MFA](https://blog.talosintelligence.com/2025yearinreview/), Talos Intelligence, 2025 & 2024
- [Evaluating Risk-Based Authentication in Production 2FA Systems](https://www.camlis.org/steven-leung-2025), CAMLIS 2025
- [Talos Takes Podcast: Passwordless Security](https://talostakes.talosintelligence.com/2018149/episodes/18062605-passwordless-security-debunking-the-biggest-myths) | [Identity & MFA Attacks](https://talostakes.talosintelligence.com/2018149/episodes/16988482-year-in-review-special-part-3-identity-and-mfa-attacks)
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/stevendleung"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/stevendleung"

[menu]
  [[menu.main]]
    identifier = "writing"
    name = "Blog"
    url = "/writing/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
