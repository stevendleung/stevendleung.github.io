baseURL = "https://stevendleung.github.io/"
languageCode = "en-us"
title = "Steven Leung"
theme = "PaperMod"
paginate = 10

[params]
  author = "Steven Leung"
  description = "ML Engineer | AI Security Researcher"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "auto"
  disableSpecial1stPost = true

  [params.homeInfoParams]
    Title = "Steven Leung"
    Content = """
Senior Machine Learning Engineer focused on the intersection of cybersecurity and AI safety.

I build ML-powered threat detection systems at [Duo Security (Cisco)](https://duo.com) and research how to make AI agents safer. My work spans adversarial detection, runtime agent security, and context engineering for agentic AI systems.

Currently exploring: runtime detection for AI agents, red-teaming agent safety classifiers, and applying cybersecurity methodology to AI safety problems.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/stevendleung"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/stevendleung"

[menu]
  [[menu.main]]
    identifier = "writing"
    name = "Writing"
    url = "/writing/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
